<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bl1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0a3"/>
      <stop offset="55%" stop-color="#f5b328"/>
      <stop offset="100%" stop-color="#8d5c06"/>
    </linearGradient>
    <filter id="blsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#blsh)">
    <!-- top nub -->
    <rect x="58" y="18" width="12" height="10" rx="2" fill="#8d5c06"/>
    <circle cx="64" cy="18" r="5" fill="#8d5c06"/>
    <!-- bell body -->
    <path d="M30 92 Q26 64 42 44 Q54 28 64 28 Q74 28 86 44 Q102 64 98 92 L98 100 L30 100 Z"
          fill="url(#bl1)" stroke="#5b3a04" stroke-width="2.5"/>
    <!-- lower lip -->
    <rect x="26" y="100" width="76" height="8" rx="2" fill="#caa004" stroke="#5b3a04" stroke-width="2"/>
    <!-- clapper -->
    <circle cx="64" cy="112" r="7" fill="#5b3a04"/>
    <!-- highlight -->
    <path d="M44 50 Q42 70 44 86" stroke="#fff" stroke-width="6" stroke-opacity="0.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
