<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="sc1" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffe29e"/>
      <stop offset="50%" stop-color="#ff7ac4"/>
      <stop offset="100%" stop-color="#7d1a5f"/>
    </radialGradient>
    <filter id="scsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
