    <circle cx="34" cy="30" r="3" fill="#fff" fill-opacity="0.9"/>
    <circle cx="100" cy="34" r="2" fill="#fff" fill-opacity="0.9"/>
    <circle cx="26" cy="74" r="2" fill="#fff" fill-opacity="0.8"/>
