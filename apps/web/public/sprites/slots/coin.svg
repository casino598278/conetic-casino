<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="cn1" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fff0a8"/>
      <stop offset="55%" stop-color="#f5b544"/>
      <stop offset="100%" stop-color="#7a4b04"/>
    </radialGradient>
    <filter id="cnsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#cnsh)">
    <circle cx="64" cy="64" r="52" fill="url(#cn1)" stroke="#5a3604" stroke-width="3"/>
    <circle cx="64" cy="64" r="44" fill="none" stroke="#8c5f10" stroke-width="2" stroke-dasharray="3 4"/>
    <text x="64" y="82" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif"
          font-weight="900" font-size="44" fill="#3a1e00" stroke="#fff" stroke-width="2"
          paint-order="stroke">×</text>
    <!-- gloss -->
    <ellipse cx="48" cy="40" rx="18" ry="8" fill="#fff" fill-opacity="0.45"/>
  </g>
</svg>
