<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- White-based gem. Pixi tints this per colour via Sprite.tint. The light
       areas stay bright under tint; the dark outlines preserve the facet
       definition. Keep fills in the 160..255 range. -->
  <defs>
    <filter id="gmsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#gmsh)">
    <!-- outer diamond silhouette -->
    <path d="M64 12 L108 44 L92 112 L36 112 L20 44 Z" fill="#ffffff" stroke="#5a5a5a" stroke-width="3" stroke-linejoin="round"/>
    <!-- top band -->
    <path d="M20 44 L64 32 L108 44 L84 52 L64 48 L44 52 Z" fill="#c8c8c8" stroke="#5a5a5a" stroke-width="2" stroke-linejoin="round"/>
    <!-- left facet -->
    <path d="M20 44 L44 52 L36 112 Z" fill="#a0a0a0" stroke="#5a5a5a" stroke-width="2"/>
    <!-- right facet -->
    <path d="M108 44 L84 52 L92 112 Z" fill="#c0c0c0" stroke="#5a5a5a" stroke-width="2"/>
    <!-- center facet -->
    <path d="M44 52 L84 52 L92 112 L36 112 Z" fill="#e0e0e0" stroke="#5a5a5a" stroke-width="2"/>
    <!-- inner highlight -->
    <path d="M54 56 L72 56 L70 80 Z" fill="#ffffff" fill-opacity="0.7"/>
    <path d="M48 60 L48 90" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  </g>
</svg>
